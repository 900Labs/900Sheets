name: Bug report
description: Report reproducible behavior in 900Sheets
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve 900Sheets. Use invented data in attachments and remove private information before uploading files.
  - type: input
    id: version
    attributes:
      label: 900Sheets version
      placeholder: v0.3.0 or commit hash
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: macOS 15.5, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - GitHub Actions release artifact
        - Built from source
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact cell values, formulas, file format, and menu actions.
      placeholder: |
        1. Create a new workbook
        2. Enter ...
        3. Choose ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or test workbook
      description: Paste short logs or attach a minimal workbook containing invented data.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal data, credentials, customer records, and confidential information.
          required: true
        - label: I checked the compatibility and known-limitations page.
          required: true
