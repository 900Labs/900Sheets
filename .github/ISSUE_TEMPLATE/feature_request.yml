name: Feature request
description: Propose a focused workflow or compatibility improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the spreadsheet workflow that is difficult or unavailable today.
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Who this helps
      description: Explain the users, organizations, or environments that need it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: input
    id: compatibility
    attributes:
      label: Required file or application compatibility
      placeholder: Excel XLSX, LibreOffice Calc, CSV, none
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Use public links and invented data only.
