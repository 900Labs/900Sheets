name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev
      - name: Install frontend dependencies
        run: npm install --prefix apps/desktop
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --prefix apps/desktop
      - name: Type check
        run: npm run check --prefix apps/desktop
      - name: Build
        run: npm run build --prefix apps/desktop
      - name: Install Playwright browsers
        run: npx --prefix apps/desktop playwright install --with-deps chromium
      - name: E2E smoke tests
        run: npm run test:e2e --prefix apps/desktop
